<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Image Gallery</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">
<h2>MyGallery</h2>

<input type="text" id="search" placeholder="Search category...">

<button id="toggleMode">🌙</button>
</nav>

<header>
<h1>Creative Image Gallery</h1>
<p>Modern responsive image gallery</p>
</header>

<div class="filters">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('city')">City</button>
<button onclick="filterImages('animals')">Animals</button>
</div>

<div class="gallery">

<div class="image nature">
<img loading="lazy" src="https://picsum.photos/400/500?1">
</div>

<div class="image city">
<img loading="lazy" src="https://picsum.photos/400/300?2">
</div>

<div class="image animals">
<img loading="lazy" src="https://picsum.photos/400/600?3">
</div>

<div class="image nature">
<img loading="lazy" src="https://picsum.photos/400/350?4">
</div>

<div class="image city">
<img loading="lazy" src="https://picsum.photos/400/450?5">
</div>

<div class="image animals">
<img loading="lazy" src="https://picsum.photos/400/400?6">
</div>

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

<span class="close">&times;</span>

<button class="prev">&#10094;</button>

<img id="lightbox-img">

<a id="download" download>
<button class="download">Download</button>
</a>

<button class="next">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
